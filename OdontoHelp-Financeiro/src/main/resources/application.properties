spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8081}

spring.jpa.open-in-view=false

server.error.include-stacktrace=never
server.error.include-message=never

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50

jwt.secret=${JWT_SECRET:}

crypto.secret-key=${CRYPTO_SECRET_KEY:}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

app.core-api-url=${FINANCEIRO_CORE_API_URL:http://localhost:8080}

core.blacklist-url=${CORE_BLACKLIST_URL:${app.core-api-url}/internal/auth/token/blacklist/check}

app.fiscal-api-url=${FINANCEIRO_FISCAL_API_URL:http://localhost:8082}
app.fiscal.enabled=${FINANCEIRO_FISCAL_ENABLED:true}
app.fiscal.tenant-id=${FINANCEIRO_FISCAL_TENANT_ID:}
app.fiscal.modo-emissao=${FISCAL_MODO_EMISSAO:MANUAL}
app.fiscal.portal-url=${FINANCEIRO_FISCAL_PORTAL_URL:${FISCAL_PORTAL_OXY_URL:}}
app.fiscal.emissor-razao-social=${FISCAL_EMISSOR_RAZAO_SOCIAL:}
app.fiscal.emissor-cnpj=${FISCAL_EMISSOR_CNPJ:}

springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

app.rate-limit.mutations-per-user-requests=60
app.rate-limit.mutations-per-user-window-minutes=1
app.rate-limit.reads-per-user-requests=300
app.rate-limit.reads-per-user-window-minutes=1
app.rate-limit.global-per-ip-requests=200
app.rate-limit.global-per-ip-window-minutes=1
