spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD}}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

cors.allowed-origins=${CORS_ORIGINS}

jwt.secret=${JWT_SECRET}

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.name=${APP_ADMIN_NAME:ADMINISTRADOR MASTER}
app.admin.phone=${APP_ADMIN_PHONE}
app.admin.cpf=${APP_ADMIN_CPF:}

app.frontend-url=${APP_FRONTEND_URL}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM}

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

app.storage.endpoint=${STORAGE_ENDPOINT}
app.storage.access-key=${STORAGE_ACCESS_KEY}
app.storage.secret-key=${STORAGE_SECRET_KEY}
app.storage.bucket=${STORAGE_BUCKET:odontohelp}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false