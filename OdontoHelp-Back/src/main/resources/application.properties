
# Profile padrao da aplicacao. Em dev/docker usamos Postgres + Flyway.
# Os testes automatizados fixam o profile "test" via @ActiveProfiles.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}


spring.jpa.open-in-view=false
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=20

# --- SEGURANcA (JWT) ---
jwt.secret=${JWT_SECRET:}
jwt.expiration=1800000
jwt.refresh-expiration=604800000

# --- CORS ---
# Permite que o seu front no Vite (5173) acesse a API
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4200}


app.admin.email=${APP_ADMIN_EMAIL:admin@odonto.com}
app.admin.password=${APP_ADMIN_PASSWORD:123456}

# --- RATE LIMIT ---
app.rate-limit.auth-login-requests=5
app.rate-limit.auth-login-window-minutes=15
app.rate-limit.auth-medium-requests=3
app.rate-limit.auth-medium-window-minutes=15
app.rate-limit.forgot-password-per-email-requests=3
app.rate-limit.forgot-password-per-email-window-minutes=60
app.rate-limit.mutations-per-user-requests=60
app.rate-limit.mutations-per-user-window-minutes=1
app.rate-limit.reads-per-user-requests=300
app.rate-limit.reads-per-user-window-minutes=1
app.rate-limit.global-per-ip-requests=200
app.rate-limit.global-per-ip-window-minutes=1

# --- IDEMPOTENCY ---
app.idempotency.ttl-hours=24