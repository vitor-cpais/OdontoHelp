# Profile exclusivo para testes automatizados (PostgreSQL via Testcontainers).
# A aplicacao NAO sobe neste profile por padrao (ver application.properties).

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.admin.email=${APP_ADMIN_EMAIL:admin@odonto.com}
app.admin.password=${APP_ADMIN_PASSWORD:123456}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.mail.enabled=false
app.mail.from=no-reply@odontohelp.local

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}

jwt.secret=${JWT_SECRET:braFuSmLxj7ZxDzvlDDEO7xSLwSCpEzo2ofobhnCjNY=}
