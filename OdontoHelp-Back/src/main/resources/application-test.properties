# Profile exclusivo para testes automatizados (PostgreSQL via Testcontainers).
# A aplicacao NAO sobe neste profile por padrao (ver application.properties).

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:test-only-jwt-secret-not-for-production}
