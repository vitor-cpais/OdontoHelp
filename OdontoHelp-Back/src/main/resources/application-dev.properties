spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgrespw}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# O schema e versionado pelo Flyway (db/migration). O Hibernate apenas valida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Apenas desenvolvimento local sem .env — em Docker use JWT_SECRET do .env
jwt.secret=${JWT_SECRET:dev-only-local-not-for-production}
