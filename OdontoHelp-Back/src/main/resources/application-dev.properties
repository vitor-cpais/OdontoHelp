spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgrespw}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# O schema e versionado pelo Flyway (db/migration). O Hibernate apenas valida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Dev local: Base64 com 32+ bytes (mesmo padrao do docker-compose.yml)
jwt.secret=${JWT_SECRET:braFuSmLxj7ZxDzvlDDEO7xSLwSCpEzo2ofobhnCjNY=}

app.admin.email=${APP_ADMIN_EMAIL:admin@odonto.com}
app.admin.password=${APP_ADMIN_PASSWORD:123456}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@odontohelp.local}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

app.storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
app.storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
app.storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
app.storage.bucket=${STORAGE_BUCKET:odontohelp}
