# Producao: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    ports: !reset []

  backend:
    ports: !reset []
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      CRYPTO_SECRET_KEY: ${CRYPTO_SECRET_KEY:?Defina CRYPTO_SECRET_KEY no .env}
      CORE_BLACKLIST_URL: ${CORE_BLACKLIST_URL:-http://backend:8080/internal/auth/token/blacklist/check}
      CORS_ORIGINS: ${CORS_ORIGINS:?Defina CORS_ORIGINS (URL do front)}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:?Defina APP_ADMIN_EMAIL}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?Defina APP_ADMIN_PASSWORD}
      APP_ADMIN_NAME: ${APP_ADMIN_NAME:-ADMINISTRADOR MASTER}
      APP_ADMIN_PHONE: ${APP_ADMIN_PHONE:?Defina APP_ADMIN_PHONE}
      APP_ADMIN_CPF: ${APP_ADMIN_CPF:-}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:?Defina APP_FRONTEND_URL (URL publica do front)}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:?Defina APP_MAIL_FROM}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:?Defina SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:?Defina SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:?Defina SPRING_MAIL_PASSWORD}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS: ${SPRING_MAIL_SMTP_STARTTLS:-true}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:?Defina STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?Defina STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-odontohelp}

  financeiro:
    ports: !reset []
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      CRYPTO_SECRET_KEY: ${CRYPTO_SECRET_KEY:?Defina CRYPTO_SECRET_KEY no .env}
      CORE_BLACKLIST_URL: ${CORE_BLACKLIST_URL:-http://backend:8080/internal/auth/token/blacklist/check}
      CORS_ORIGINS: ${CORS_ORIGINS:?Defina CORS_ORIGINS (URL do front)}
      FINANCEIRO_CORE_API_URL: http://backend:8080
      FINANCEIRO_FISCAL_API_URL: http://fiscal:8082
      FINANCEIRO_FISCAL_ENABLED: ${FINANCEIRO_FISCAL_ENABLED:-true}
      FINANCEIRO_FISCAL_TENANT_ID: ${FINANCEIRO_FISCAL_TENANT_ID:-${FISCAL_EMISSOR_CNPJ:?Defina FISCAL_EMISSOR_CNPJ no .env}}
      FISCAL_MODO_EMISSAO: ${FISCAL_MODO_EMISSAO:-MANUAL}
      FISCAL_PORTAL_OXY_URL: ${FISCAL_PORTAL_OXY_URL:-}
      FISCAL_EMISSOR_RAZAO_SOCIAL: ${FISCAL_EMISSOR_RAZAO_SOCIAL:?Defina FISCAL_EMISSOR_RAZAO_SOCIAL}
      FISCAL_EMISSOR_CNPJ: ${FISCAL_EMISSOR_CNPJ:?Defina FISCAL_EMISSOR_CNPJ no .env}

  fiscal:
    ports: !reset []
    environment:
      FISCAL_DB_PASS: ${FISCAL_DB_PASS:-${POSTGRES_PASSWORD}}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      CRYPTO_SECRET_KEY: ${CRYPTO_SECRET_KEY:?Defina CRYPTO_SECRET_KEY no .env}
      CORE_BLACKLIST_URL: ${CORE_BLACKLIST_URL:-http://backend:8080/internal/auth/token/blacklist/check}
      FISCAL_MODO_EMISSAO: ${FISCAL_MODO_EMISSAO:-MANUAL}
      FISCAL_EMISSOR_CNPJ: ${FISCAL_EMISSOR_CNPJ:?Defina FISCAL_EMISSOR_CNPJ no .env}
      FISCAL_EMISSOR_RAZAO_SOCIAL: ${FISCAL_EMISSOR_RAZAO_SOCIAL:?Defina FISCAL_EMISSOR_RAZAO_SOCIAL}
      FISCAL_EMISSOR_INSCRICAO_MUNICIPAL: ${FISCAL_EMISSOR_INSCRICAO_MUNICIPAL:-}
      FISCAL_EMISSOR_CODIGO_MUNICIPIO: ${FISCAL_EMISSOR_CODIGO_MUNICIPIO:-}
      FISCAL_EMISSOR_CODIGO_SERVICO: ${FISCAL_EMISSOR_CODIGO_SERVICO:-}
      FISCAL_EMISSOR_ALIQUOTA_ISS: ${FISCAL_EMISSOR_ALIQUOTA_ISS:-}
      FISCAL_EMISSOR_REGIME_TRIBUTARIO: ${FISCAL_EMISSOR_REGIME_TRIBUTARIO:-}
      FISCAL_EMISSOR_LOGRADOURO: ${FISCAL_EMISSOR_LOGRADOURO:-}
      FISCAL_EMISSOR_NUMERO: ${FISCAL_EMISSOR_NUMERO:-}
      FISCAL_EMISSOR_BAIRRO: ${FISCAL_EMISSOR_BAIRRO:-}
      FISCAL_EMISSOR_CEP: ${FISCAL_EMISSOR_CEP:-}
      FISCAL_PORTAL_OXY_URL: ${FISCAL_PORTAL_OXY_URL:-}
      FISCAL_ELOTECH_URL: ${FISCAL_ELOTECH_URL:-}

  minio:
    ports: !reset []

  frontend:
    ports: !reset []
    build:
      args:
        VITE_API_URL: ${VITE_API_URL:?Defina VITE_API_URL (URL publica da API, ex. https://api.seudominio.com)}
        VITE_FINANCEIRO_API_URL: ${VITE_FINANCEIRO_API_URL:?Defina VITE_FINANCEIRO_API_URL (ex. https://financeiro-api.seudominio.com)}

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: odontohelp-caddy:local
    container_name: odontohelp-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - financeiro
    ports:
      - "80:80"
      - "443:443"
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:?Defina FRONTEND_DOMAIN (ex. odontohelp.duckdns.org)}
      API_DOMAIN: ${API_DOMAIN:?Defina API_DOMAIN (ex. api-odontohelp.duckdns.org)}
      FINANCEIRO_API_DOMAIN: ${FINANCEIRO_API_DOMAIN:?Defina FINANCEIRO_API_DOMAIN (ex. financeiro-api-odontohelp.duckdns.org)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
